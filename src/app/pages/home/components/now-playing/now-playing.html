<section class="relative z-10">
  <div class="mb-6">
    <h2 class="font-bold text-white text-3xl z-10">Teraz gramy</h2>
  </div>

  <div class="w-full">
    <hlm-carousel class="w-full">
      <hlm-carousel-content>
        @for (item of moviesData(); track item.id) {
          <hlm-carousel-item class="basis-1/2 sm:basis-1/3 lg:basis-1/4 2xl:basis-1/6">
            <div class="px-2 h-full">
              <app-movie-card class="block h-full" [movieData]="item"></app-movie-card>
            </div>
          </hlm-carousel-item>
        }
      </hlm-carousel-content>

      <button hlm-carousel-previous class="hidden lg:flex"></button>
      <button hlm-carousel-next class="hidden lg:flex"></button>
    </hlm-carousel>
  </div>
</section>
