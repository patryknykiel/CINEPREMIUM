<div
  class="relative flex w-full aspect-2/3 flex-col justify-end overflow-hidden rounded-lg bg-cover bg-center bg-no-repeat cursor-pointer transition-transform hover:scale-105"
  [style.backgroundImage]="'url(' + movieData().posterUrl + ')'"
>
  <div class="absolute inset-0 bg-linear-to-t from-black/90 via-black/40 to-transparent"></div>

  <div class="relative z-10 p-4 flex flex-col gap-1 w-full">
    <div class="flex flex-row gap-1 items-center">
      <svg class="w-3 h-3 text-yellow-400 fill-yellow-400" lucideStar></svg>
      <p class="font-bold text-yellow-400 text-sm leading-none">{{ movieData().rate }}</p>
    </div>
    <h3 class="font-medium text-white text-lg truncate w-full">
      {{ movieData().title }}
    </h3>
    <p class="text-gray-400 text-xs uppercase truncate pr-4">
      {{ movieData().genre }}
    </p>
  </div>
</div>
