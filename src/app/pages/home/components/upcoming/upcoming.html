<section class="relative z-10 py-5">
  <div class="flex flex-col mb-6 gap-1">
    <h2 class="font-bold text-white text-3xl z-10">Nadchodzące premiery</h2>
    <p class="text-white/50 text-lg">
      Nie przegap największych hitów tego sezonu. Zarezerwuj miejsce jako pierwszy.
    </p>
  </div>
  <div class="flex flex-col sm:flex-row w-full h-full gap-10">
    @for (item of moviesData(); track item.id) {
      <app-upcoming-movie-card
        [movieData]="item"
        class="basis-1/2 xl:basis-1/3 flex-col flex h-110 sm:h-105 md:h-120 2xl:h-125 w-full"
      ></app-upcoming-movie-card>
    }
  </div>
</section>
