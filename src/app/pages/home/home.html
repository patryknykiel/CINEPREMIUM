@if (homeData()) {
  <app-header></app-header>
  <section class="w-full h-full">
    @if (homeData()?.hero; as heroData) {
      <div
        class="w-full h-full bg-cover bg-center bg-no-repeat flex flex-col justify-start px-7 lg:px-30 relative gap-20 pt-60 pb-20 lg:py-40"
        [style.backgroundImage]="'url(' + heroData.heroUrl + ')'"
      >
        <app-hero [movieData]="heroData"></app-hero>
        <app-now-playing [moviesData]="homeData()?.nowPlaying ?? []"></app-now-playing>
      </div>
    }
    <div class="px-7 lg:px-30 bg-accent-foreground py-12">
      <app-upcoming [moviesData]="homeData()?.upcoming ?? []"></app-upcoming>
    </div>
    <div class="px-7 lg:px-30 bg-accent-foreground/98 py-17">
      <app-loyalty-club></app-loyalty-club>
    </div>
  </section>
}
